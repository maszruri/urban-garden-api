spring.application.name=urban-garden-api

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=rahasia
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Sihir JPA / Hibernate
# "update" artinya Spring Boot akan OTOMATIS membuatkan tabel kalau belum ada!
spring.jpa.hibernate.ddl-auto=update

# "true" agar kita bisa melihat query SQL yang di-generate otomatis oleh Spring Boot di terminal
spring.jpa.show-sql=true